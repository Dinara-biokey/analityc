<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Biokey Operational Analytics</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
:root{--bg:#fff;--bg2:#f4f5f7;--bg3:#eceef2;--tx:#1a1a1a;--tx2:#6b7280;--tx3:#9ca3af;--br:#e5e7eb;--br2:#d1d5db;--ac:#E8185A;--ac2:#c4144d;--pu:#534AB7;--pu2:#3C3489}
body{background:var(--bg3);min-height:100vh}
.shell{max-width:1280px;margin:0 auto;min-height:100vh}
#scr-login{display:flex;min-height:100vh}
#scr-app{display:none;flex-direction:row;height:100vh}
.ll{flex:1;background:var(--bg2);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;position:relative;overflow:hidden}
.ll svg.dc{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:.04}
.lp{width:320px;flex-shrink:0;background:var(--bg);border-left:0.5px solid var(--br);display:flex;align-items:center;justify-content:center;padding:40px 32px}
.lf{margin-bottom:10px}.lf label{font-size:11px;color:var(--tx2);display:block;margin-bottom:3px}
.lf input{width:100%;font-size:13px;padding:8px 10px;border-radius:8px;border:0.5px solid var(--br2);background:var(--bg2);color:var(--tx);font-family:inherit}
.lf input:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 2px rgba(232,24,90,.1)}
.lerr{font-size:12px;color:#A32D2D;margin-bottom:10px;padding:7px 10px;background:#FCEBEB;border-radius:8px;display:none}
.lbtn{width:100%;padding:10px;border-radius:8px;background:var(--ac);color:#fff;border:none;font-size:13px;font-weight:500;cursor:pointer}.lbtn:hover{background:var(--ac2)}
.side{width:52px;background:var(--bg);border-right:0.5px solid var(--br);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:2px;flex-shrink:0}
.ni{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--tx2);font-size:17px;border:none;background:none}
.ni:hover{background:var(--bg2)}.ni.on{background:rgba(232,24,90,.1);color:var(--ac)}.ni.adm.on{background:#EEEDFE;color:var(--pu)}
.sbot{margin-top:auto}.sav{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;cursor:pointer;border:none;margin:0 auto}
.pnl{width:196px;background:var(--bg);border-right:0.5px solid var(--br);display:flex;flex-direction:column;flex-shrink:0}
.phead{padding:14px 12px 10px;border-bottom:0.5px solid var(--br)}
.psub{font-size:11px;color:var(--tx2);margin-top:2px}
.navg{padding:6px 8px;flex:1;overflow-y:auto}
.ngl{font-size:10px;color:var(--tx2);padding:6px 6px 3px;letter-spacing:.5px}
.nv{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:8px;font-size:12px;color:var(--tx2);cursor:pointer;border:none;background:none;width:100%;text-align:left}
.nv:hover{background:var(--bg2)}.nv.on{background:rgba(232,24,90,.08);color:var(--ac);font-weight:500}.nv.adm.on{background:#EEEDFE;color:var(--pu)}
.nv i{font-size:15px;flex-shrink:0}
.nb{margin-left:auto;background:var(--bg2);color:var(--tx2);font-size:10px;padding:1px 6px;border-radius:99px}
.nv.on .nb{background:var(--ac);color:#fff}.nv.adm.on .nb{background:var(--pu);color:#fff}
.pfoot{padding:8px 12px;border-top:0.5px solid var(--br);font-size:11px;color:var(--tx2)}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{height:46px;background:var(--bg);border-bottom:0.5px solid var(--br);display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0}
.tbt{font-size:13px;font-weight:500;flex:1}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:500}
.op-chip{background:rgba(232,24,90,.1);color:var(--ac2)}.adm-chip{background:#EEEDFE;color:var(--pu2)}
.body{flex:1;overflow:auto;padding:14px}
.pg{display:none}.pg.on{display:block}
.krow{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:12px}
.kpi{background:var(--bg);border:0.5px solid var(--br);border-radius:12px;padding:11px}
.kpii{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;margin-bottom:7px}
.kpiv{font-size:16px;font-weight:500;line-height:1}.kpil{font-size:10px;color:var(--tx2);margin-top:3px}
.card{background:var(--bg);border:0.5px solid var(--br);border-radius:12px;overflow:hidden;margin-bottom:12px}
.ch{padding:10px 14px;border-bottom:0.5px solid var(--br);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.cht{font-size:12px;font-weight:500}.cb{padding:12px 14px}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.r3{display:grid;grid-template-columns:2fr 1fr;gap:10px;margin-bottom:12px}
.pbar{height:5px;background:var(--bg2);border-radius:99px;overflow:hidden;position:relative;margin:5px 0 3px}
.pf{height:100%;border-radius:99px;position:absolute;top:0}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
th{padding:7px 10px;text-align:left;font-size:11px;color:var(--tx2);font-weight:400;border-bottom:0.5px solid var(--br)}
td{padding:7px 10px;border-bottom:0.5px solid var(--br);color:var(--tx);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--bg2)}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:99px;font-size:11px;font-weight:500}
.bf{background:#E1F5EE;color:#085041}.bp{background:#FAEEDA;color:#633806}.bc{background:#FCEBEB;color:#791F1F}
.bh{background:#FAECE7;color:#993C1D}.bk{background:#E6F1FB;color:#185FA5}
.bpend{background:#FAEEDA;color:#633806}.bappr{background:#E1F5EE;color:#085041}.brej{background:#FCEBEB;color:#791F1F}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:8px;border:0.5px solid var(--br2);background:none;cursor:pointer;font-size:12px;color:var(--tx);font-family:inherit}
.btn:hover{background:var(--bg2)}
.btn.g{background:var(--ac);color:#fff;border-color:var(--ac);font-weight:500}.btn.g:hover{background:var(--ac2)}
.btn.v{background:var(--pu);color:#fff;border-color:var(--pu);font-weight:500}.btn.v:hover{background:var(--pu2)}
.btn.xs{padding:3px 8px;font-size:11px}
.btn.del{color:#A32D2D;border-color:#F09595}.btn.del:hover{background:#FCEBEB}
.btn.edt{color:var(--pu);border-color:#c5c2f0}.btn.edt:hover{background:#EEEDFE}
.btn.appr{color:#085041;border-color:#5DCAA5}.btn.appr:hover{background:#E1F5EE}
.btn.rej{color:#A32D2D;border-color:#F09595}.btn.rej:hover{background:#FCEBEB}
.btn.plus{color:#085041;border-color:#5DCAA5;background:#E1F5EE}.btn.plus:hover{background:#c8f0e2}
.btn.minus{color:#A32D2D;border-color:#F09595;background:#FCEBEB}.btn.minus:hover{background:#f8d0d0}
input,select,textarea{width:100%;font-family:inherit;font-size:12px;padding:6px 9px;border-radius:8px;border:0.5px solid var(--br2);background:var(--bg);color:var(--tx)}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 2px rgba(232,24,90,.1)}
label{font-size:11px;color:var(--tx2);display:block;margin-bottom:3px}
.fr{display:grid;gap:8px;margin-bottom:8px}.fr2{grid-template-columns:1fr 1fr}.fr1{grid-template-columns:1fr}.fr3{grid-template-columns:1fr 1fr 1fr}
.seg{display:flex;background:var(--bg2);border-radius:8px;padding:3px;gap:2px}
.sb{flex:1;padding:5px 6px;border-radius:6px;font-size:11px;border:none;background:none;cursor:pointer;color:var(--tx2);font-family:inherit;display:flex;align-items:center;justify-content:center;gap:3px}
.sb.on{background:var(--bg);color:var(--tx);font-weight:500;border:0.5px solid var(--br)}
.sb.hot.on{background:#FAECE7;color:#993C1D;border-color:#F0997B}.sb.cold.on{background:#E6F1FB;color:#185FA5;border-color:#85B7EB}
.pbox{background:var(--bg2);border-radius:8px;padding:10px;margin-bottom:8px}
.fpbar{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.fp{padding:3px 10px;border-radius:99px;font-size:11px;border:0.5px solid var(--br2);background:none;cursor:pointer;color:var(--tx2);font-family:inherit}
.fp.on{background:var(--tx);color:var(--bg);border-color:transparent}
.alert{padding:7px 12px;border-radius:8px;font-size:12px;margin-bottom:10px}
.aok{background:#E1F5EE;color:#085041;border:0.5px solid #5DCAA5}
.aerr{background:#FCEBEB;color:#791F1F;border:0.5px solid #F09595}
.ldr{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:0.5px solid var(--br)}.ldr:last-child{border-bottom:none}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}
.urow{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:0.5px solid var(--br);font-size:12px}.urow:last-child{border-bottom:none}
.df{display:flex;align-items:center;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.dfseg{display:flex;background:var(--bg2);border-radius:8px;padding:2px;gap:1px;border:0.5px solid var(--br)}
.dfb{padding:3px 10px;border-radius:6px;font-size:11px;border:none;background:none;cursor:pointer;color:var(--tx2);font-family:inherit;white-space:nowrap}
.dfb:hover{color:var(--tx)}.dfb.on{background:var(--bg);color:var(--tx);font-weight:500;box-shadow:0 0 0 0.5px var(--br2)}
.dfr{display:none;align-items:center;gap:4px;background:var(--bg2);border-radius:8px;padding:2px 8px 2px 6px;border:0.5px solid var(--br)}
.dfr.vis{display:flex}.dfr.act{border-color:var(--ac)}
.dfr input[type=date]{width:96px;font-size:11px;padding:2px 4px;border:none;background:transparent;color:var(--tx);border-radius:4px;font-family:inherit}
.dfr span{font-size:11px;color:var(--tx2)}
.dfok{padding:2px 8px;border-radius:6px;font-size:10px;font-weight:500;background:var(--ac);color:#fff;border:none;cursor:pointer}
.dflbl{font-size:11px;color:var(--tx2)}
.day-hdr{display:grid;grid-template-columns:64px 1fr 80px 1fr 90px 100px;gap:6px;padding:0 0 6px;font-size:10px;color:var(--tx2);border-bottom:0.5px solid var(--br);margin-bottom:2px}
.day-row{display:grid;grid-template-columns:64px 1fr 80px 1fr 90px 100px;gap:6px;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--br);font-size:11px}.day-row:last-child{border-bottom:none}
.tag-avg{display:inline-flex;padding:1px 7px;border-radius:99px;font-size:10px;font-weight:500;background:#EEEDFE;color:#3C3489}
.adj-row{display:flex;align-items:center;gap:8px;padding:8px 14px;border-bottom:0.5px solid var(--br);font-size:12px}.adj-row:last-child{border-bottom:none}
.cfg-block{background:var(--bg2);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:11px;color:var(--tx2);line-height:1.7}
.moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;align-items:center;justify-content:center}
.mbox{background:var(--bg);border-radius:12px;padding:20px;width:380px;border:0.5px solid var(--br);box-shadow:0 20px 60px rgba(0,0,0,.2)}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mtitle{font-size:14px;font-weight:500}
.type-seg{display:flex;gap:6px;margin-bottom:12px}
.type-btn{flex:1;padding:8px;border-radius:8px;border:0.5px solid var(--br2);background:none;cursor:pointer;font-size:12px;font-family:inherit;text-align:center}
.type-btn.plus-on{background:#E1F5EE;border-color:#5DCAA5;color:#085041;font-weight:500}
.type-btn.minus-on{background:#FCEBEB;border-color:#F09595;color:#A32D2D;font-weight:500}
@media(max-width:700px){.ll{display:none}.lp{width:100%}#scr-app{height:100dvh}.pnl{width:150px}.r3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="shell">
<div id="scr-login">
  <div class="ll">
    <svg class="dc" xmlns="http://www.w3.org/2000/svg"><defs><pattern id="gg" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#000" stroke-width="0.5"/></pattern></defs><rect width="100%" height="100%" fill="url(#gg)"/></svg>
    <div style="z-index:1;text-align:center">
      <div style="display:flex;align-items:baseline;justify-content:center;margin-bottom:3px">
        <span style="font-family:'Arial Black',Arial,sans-serif;font-weight:900;font-size:51px;color:#E8185A;line-height:1;letter-spacing:-1.5px">biokey.</span>
        <div style="font-family:'Arial Black',Arial,sans-serif;font-weight:900;font-size:51px;color:#E8185A;line-height:1;height:1em;overflow:hidden;display:inline-block;vertical-align:baseline">
          <div id="cs" style="display:flex;flex-direction:column;transition:transform .5s cubic-bezier(.4,0,.2,1)">
            <span style="display:block;height:1em;line-height:1">kz</span><span style="display:block;height:1em;line-height:1">uz</span><span style="display:block;height:1em;line-height:1">kg</span><span style="display:block;height:1em;line-height:1">kz</span>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:4px;justify-content:center;margin-bottom:16px">
        <div style="height:4px;width:82px;background:#1a1a1a;border-radius:2px"></div>
        <div style="height:4px;width:62px;background:#DD0000;border-radius:2px"></div>
        <div style="height:4px;width:62px;background:#F5C200;border-radius:2px"></div>
      </div>
      <div style="font-size:16px;font-weight:500;color:#1a1a1a;margin-bottom:8px">Operational Analytics</div>
      <div style="font-size:11px;color:#6b7280;max-width:200px;margin:0 auto;line-height:1.6">Платформа управления продажами и аналитики</div>
    </div>
  </div>
  <div class="lp">
    <div style="width:100%">
      <div style="margin-bottom:24px"><div style="font-size:16px;font-weight:500;margin-bottom:4px">Вход</div><div style="font-size:12px;color:#6b7280">Введите данные для входа</div></div>
      <div class="lf"><label>Логин</label><input id="ll" autocomplete="off" placeholder="Логин" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <div class="lf" style="margin-bottom:16px"><label>Пароль</label><input id="lpass" type="password" placeholder="Пароль" onkeydown="if(event.key==='Enter')doLogin()"/></div>
      <div class="lerr" id="lerr">Неверный логин или пароль</div>
      <button class="lbtn" onclick="doLogin()">Войти</button>
    </div>
  </div>
</div>
<div id="scr-app">
  <div class="side">
    <div style="width:36px;height:36px;border-radius:10px;border:0.5px solid #e5e7eb;background:#fff;display:flex;align-items:center;justify-content:center;margin-bottom:10px;overflow:hidden;flex-shrink:0">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 52" width="34" height="34"><text x="-4" y="44" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="50" fill="#E8185A">b.</text></svg>
    </div>
    <div id="si"></div>
    <div class="sbot" style="margin-top:auto;padding-bottom:10px"><div class="sav" id="sav" onclick="logout()" title="Выйти" style="background:rgba(232,24,90,.1);color:#c4144d"></div></div>
  </div>
  <div class="pnl">
    <div class="phead">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 56" width="100" height="17" style="display:block;margin-bottom:4px"><text x="0" y="44" font-family="Arial Black,Arial,sans-serif" font-weight="900" font-size="50" fill="#E8185A">biokey.</text><rect x="0" y="50" width="106" height="5" rx="2.5" fill="#111"/><rect x="109" y="50" width="80" height="5" rx="2.5" fill="#DD0000"/><rect x="192" y="50" width="80" height="5" rx="2.5" fill="#F5C200"/></svg>
      <div style="font-size:10px;color:#6b7280">Operational Analytics</div>
      <div class="psub" id="psub"></div>
    </div>
    <div class="navg" id="nav"></div>
    <div class="pfoot" id="pfoot"></div>
  </div>
  <div class="main">
    <div class="topbar"><div class="tbt" id="tbt">—</div><div class="chip" id="rchip"></div><div id="tbr"></div></div>
    <div class="body"><div id="alrt" style="display:none"></div><div id="pages"></div></div>
  </div>
</div>
</div>
<div class="moverlay" id="emod">
  <div class="mbox">
    <div class="mhead"><span class="mtitle">Редактировать аккаунт</span><button class="btn xs" onclick="closeEM()"><i class="ti ti-x"></i></button></div>
    <div class="fr fr1"><div><label>Имя</label><input id="eu-n"/></div></div>
    <div class="fr fr1"><div><label>Логин</label><input id="eu-l"/></div></div>
    <div class="fr fr1"><div><label>Новый пароль (пусто — без изменений)</label><input id="eu-p" type="password" placeholder="Новый пароль"/></div></div>
    <div class="fr fr2"><div><label>Роль</label><select id="eu-r"><option value="operator">Оператор</option><option value="admin">Администратор</option></select></div><div></div></div>
    <div class="fr fr2"><div><label>План (₸/мес)</label><input id="eu-pl" type="number"/></div><div><label>Ставка (₸/мес)</label><input id="eu-s" type="number"/></div></div><div class="fr fr1"><div><label>Город/Отдел</label><select id="eu-city"><option value="Астана">Астана</option><option value="Шымкент">Шымкент</option></select></div></div>
    <div style="display:flex;gap:8px;margin-top:4px"><button class="btn v" style="flex:1;justify-content:center" onclick="saveEM()"><i class="ti ti-check"></i> Сохранить</button><button class="btn" onclick="closeEM()">Отмена</button></div>
  </div>
</div>
<div class="moverlay" id="adjmod">
  <div class="mbox">
    <div class="mhead"><span class="mtitle">Корректировка бонуса</span><button class="btn xs" onclick="closeAdj()"><i class="ti ti-x"></i></button></div>
    <div class="type-seg">
      <button class="type-btn plus-on" id="adj-type-plus" onclick="setAdjType('plus')"><i class="ti ti-plus"></i> Доп. бонус</button>
      <button class="type-btn" id="adj-type-minus" onclick="setAdjType('minus')"><i class="ti ti-minus"></i> Штраф</button>
    </div>
    <div id="adj-op-wrap" style="margin-bottom:8px;display:none"><label>Оператор</label><select id="adj-op"></select></div>
    <div class="fr fr2"><div><label>Сумма (₸)</label><input id="adj-amount" type="number" min="0" placeholder="5000"/></div><div><label>Дата</label><input id="adj-date" type="date"/></div></div>
    <div class="fr fr1"><div><label>Причина / комментарий</label><input id="adj-comment" placeholder="Например: перевыполнение плана"/></div></div>
    <div style="display:flex;gap:8px"><button class="btn g" style="flex:1;justify-content:center" id="adj-save-btn" onclick="saveAdj()"><i class="ti ti-check"></i> Применить</button><button class="btn" onclick="closeAdj()">Отмена</button></div>
  </div>
</div>
<script>
const AVC=[{bg:'rgba(232,24,90,.1)',c:'#c4144d'},{bg:'#E6F1FB',c:'#0C447C'},{bg:'#FAEEDA',c:'#633806'},{bg:'#FBEAF0',c:'#72243E'},{bg:'#EEEDFE',c:'#3C3489'}];
let S={},CU=null,payT='full',srcT='hot',ordF='all',apF='pending',euId=null;
let dMode='month',dFrom='',dTo='',dMonth='';
let adjType='plus',adjForUserId=null;

function fmt(n){return Math.round(n).toLocaleString('ru')+'₸';}
function cm(){return new Date().toISOString().slice(0,7);}
function td(){return new Date().toISOString().slice(0,10);}
function yd(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);}
function w7(){const d=new Date();d.setDate(d.getDate()-6);return d.toISOString().slice(0,10);}

function getDayStats(orders){
  const cfg=S.bonusConfig,tax=cfg.tax||0;
  const byDay={};
  orders.filter(o=>o.payType!=='cancel').forEach(o=>{if(!byDay[o.date])byDay[o.date]={total:0,cnt:0};byDay[o.date].total+=o.amountPaid;byDay[o.date].cnt++;});
  return Object.entries(byDay).sort((a,b)=>b[0].localeCompare(a[0])).map(([date,{total,cnt}])=>{
    const avg=cnt>0?Math.round(total/cnt):0;
    const taxAmt=Math.round(total*tax/100),net=total-taxAmt;
    let pct=0;cfg.tiers.forEach(t=>{if(total>=t.from&&total<=t.to)pct=t.pct;});
    const bonusIncome=Math.round(net*pct/100);
    let bonusAvg=0;cfg.avgTiers.forEach(t=>{if(avg>=t.minAvg)bonusAvg=t.bonus;});
    return{date,total,cnt,avg,taxAmt,net,pct,bonusIncome,bonusAvg,bonusDay:bonusIncome+bonusAvg};
  });
}

function getUserAdj(uid){const{f,t}=gRange();return(S.adjustments||[]).filter(a=>a.userId===uid&&a.date>=f&&a.date<=t);}

function calcTotals(orders,plan,uid){
  const days=getDayStats(orders);
  const a=orders.filter(o=>o.payType!=='cancel');
  const paid=a.reduce((s,o)=>s+o.amountPaid,0);
  const rem=orders.filter(o=>o.payType==='partial').reduce((s,o)=>s+(o.amountTotal-o.amountPaid),0);
  const totalOrders=a.length,avgCheck=totalOrders>0?Math.round(paid/totalOrders):0;
  const bonusAuto=days.reduce((s,d)=>s+d.bonusDay,0);
  const bonusIncome=days.reduce((s,d)=>s+d.bonusIncome,0);
  const bonusAvgSum=days.reduce((s,d)=>s+d.bonusAvg,0);
  const adjs=uid?getUserAdj(uid):[];
  const adjPlus=adjs.filter(a=>a.type==='plus').reduce((s,a)=>s+a.amount,0);
  const adjMinus=adjs.filter(a=>a.type==='minus').reduce((s,a)=>s+a.amount,0);
  const bonus=bonusAuto+adjPlus-adjMinus;
  const hc=a.filter(o=>o.source==='hot').length,kc=a.filter(o=>o.source==='cold').length;
  const pc=orders.filter(o=>o.payType==='partial').length;
  const pct=plan>0?Math.min(paid/plan*100,200):0;
  return{paid,rem,totalOrders,avgCheck,bonus,bonusAuto,bonusIncome,bonusAvgSum,adjPlus,adjMinus,hc,kc,pc,pct,days,adjs};
}

function gRange(){const t=td();if(dMode==='today')return{f:t,t:t};if(dMode==='yesterday'){const y=yd();return{f:y,t:y};}if(dMode==='week')return{f:w7(),t:t};if(dMode==='range'&&dFrom&&dTo)return{f:dFrom,t:dTo};const[y,m]=dMonth.split('-'),l=new Date(+y,+m,0).getDate();return{f:`${dMonth}-01`,t:`${dMonth}-${String(l).padStart(2,'0')}`};}
function fd(orders){const{f,t}=gRange();return orders.filter(o=>o.date>=f&&o.date<=t);}
function rlbl(){if(dMode==='today')return'Сегодня';if(dMode==='yesterday')return'Вчера';if(dMode==='week')return'7 дней';if(dMode==='range')return`${dFrom} — ${dTo}`;const[y,m]=dMonth.split('-');return new Date(y,m-1,1).toLocaleString('ru',{month:'long',year:'numeric'});}

function mkDF(pfx,fn){return`<div class="df" id="${pfx}-df"><div class="dfseg"><button class="dfb${dMode==='today'?' on':''}" onclick="setDM('today','${pfx}','${fn}')">Сегодня</button><button class="dfb${dMode==='yesterday'?' on':''}" onclick="setDM('yesterday','${pfx}','${fn}')">Вчера</button><button class="dfb${dMode==='week'?' on':''}" onclick="setDM('week','${pfx}','${fn}')">Неделя</button><button class="dfb${dMode==='month'?' on':''}" onclick="setDM('month','${pfx}','${fn}')">Месяц</button></div>${dMode==='month'?`<select id="${pfx}-ms" onchange="dMonth=this.value;setDM('month','${pfx}','${fn}')" style="width:auto;font-size:11px;padding:3px 6px;border-radius:6px"></select>`:''}<button class="dfb" style="border:0.5px solid #e5e7eb;border-radius:6px;padding:3px 8px" onclick="toggleDR('${pfx}')"><i class="ti ti-calendar" style="font-size:12px"></i></button><div class="dfr${dMode==='range'?' vis act':''}" id="${pfx}-range"><input type="date" id="${pfx}-rf" value="${dFrom}"/><span>—</span><input type="date" id="${pfx}-rt" value="${dTo}"/><button class="dfok" onclick="applyDR('${pfx}','${fn}')">OK</button></div><span class="dflbl">${rlbl()}</span></div>`;}
function setDM(m,pfx,fn){dMode=m;updDF(pfx);window[fn]&&window[fn]();}
function applyDR(pfx,fn){const rf=document.getElementById(pfx+'-rf'),rt=document.getElementById(pfx+'-rt');if(rf)dFrom=rf.value;if(rt)dTo=rt.value;if(!dFrom||!dTo){showAlert('Выберите даты','err');return;}dMode='range';updDF(pfx);window[fn]&&window[fn]();}
function toggleDR(pfx){const r=document.getElementById(pfx+'-range');if(r)r.classList.toggle('vis');}
function updDF(pfx){const lbl=document.querySelectorAll(`#${pfx}-df .dflbl`);lbl.forEach(l=>l.textContent=rlbl());const btns=document.querySelectorAll(`#${pfx}-df .dfb`);btns.forEach(b=>b.classList.remove('on'));const map={today:0,yesterday:1,week:2,month:3};if(dMode in map){const b=btns[map[dMode]];if(b)b.classList.add('on');}const ms=document.getElementById(pfx+'-ms');if(ms)fillMS(pfx+'-ms');}
function fillMS(id){const s=document.getElementById(id);if(!s)return;const set=new Set([cm()]);S.orders.forEach(o=>set.add(o.date.slice(0,7)));const arr=Array.from(set).sort().reverse();s.innerHTML='';arr.forEach(mo=>{const o=document.createElement('option');const[y,mn]=mo.split('-');o.value=mo;o.textContent=new Date(y,mn-1,1).toLocaleString('ru',{month:'short',year:'2-digit'});if(mo===dMonth)o.selected=true;s.appendChild(o);});}

 (${Math.round(cold/tot*100)}%)</span></div><div class="pbar"><div class="pf" style="background:#378ADD;width:${Math.round(cold/tot*100)}%;z-index:1"></div></div></div><div style="margin-top:12px;font-size:11px;color:#6b7280">Всего: ${all.filter(o=>o.payType!=='cancel').length}</div>`;}

function rAP(){setTimeout(()=>fillMS('ap-ms'),10);let orders=fd(S.orders);if(apF==='pending')orders=orders.filter(o=>(o.approval||'pending')==='pending');else if(apF==='approved')orders=orders.filter(o=>o.approval==='approved');else if(apF==='rejected')orders=orders.filter(o=>o.approval==='rejected');orders.sort((a,b)=>b.date.localeCompare(a.date));const pend=fd(S.orders).filter(o=>(o.approval||'pending')==='pending').length;if(document.getElementById('nb-p'))document.getElementById('nb-p').textContent=pend;const apb={approved:'<span class="badge bappr">Подтверждён</span>',rejected:'<span class="badge brej">Отклонён</span>',pending:'<span class="badge bpend">На проверке</span>'};const un=id=>{const u=S.users.find(x=>x.id===id);return u?u.name:id;};document.getElementById('aplist').innerHTML=orders.length?`<table><thead><tr><th style="width:68px">Дата</th><th style="width:78px">ID</th><th>Клиент</th><th style="width:76px">Оператор</th><th style="width:78px">Оплачено</th><th style="width:80px">Статус</span></th><th style="width:88px">Действие</th></tr></thead><tbody>${orders.map(o=>`<tr><td>${o.date}</td><td style="font-family:monospace">${o.orderId||'—'}</td><td>${o.client}</td><td>${un(o.userId)}</td><td style="color:#E8185A;font-weight:500">${fmt(o.amountPaid)}</td><td>${apb[o.approval||'pending']}</td><td>${(o.approval||'pending')==='pending'?`<div style="display:flex;gap:4px"><button class="btn xs appr" onclick="approve('${o.id}','approved')"><i class="ti ti-check"></i> Да</button><button class="btn xs rej" onclick="approve('${o.id}','rejected')"><i class="ti ti-x"></i> Нет</button></div>`:'—'}</td></tr>`).join('')}</tbody></table>`:'<div style="padding:20px;text-align:center;font-size:11px;color:#9ca3af">Нет заказов</div>';}
